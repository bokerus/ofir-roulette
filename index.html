<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070A12" />
  <title>הרולטה של אופיר | Premium</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root { --bg-dark: #070A12; --surface-card: rgba(14, 20, 36, 0.85); --text-main: #f8fafc; --text-muted: #94a3b8; --accent-gold: #fbbf24; --accent-rose: #fb7185; --radius-lg: 28px; --radius-md: 16px; }
    body { min-height: 100vh; font-family: system-ui, sans-serif; color: var(--text-main); background: var(--bg-dark); display: flex; align-items: center; justify-content: center; padding: 16px; text-align: center; margin: 0; overflow: hidden; }
    .card { background: var(--surface-card); border-radius: var(--radius-lg); padding: 32px 24px; width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .header-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 24px; font-weight: 600; }
    .reel-wrapper { height: 100px; background: rgba(0,0,0,0.4); border-radius: var(--radius-md); position: relative; overflow: hidden; margin-bottom: 24px; border: 2px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
    .reel-strip { position: absolute; width: 100%; top: 0; left: 0; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
    .reel-item { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: var(--accent-gold); }
    .btn-primary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-rose)); color: #000; padding: 18px; border-radius: var(--radius-md); font-weight: 900; border: none; cursor: pointer; width: 100%; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.2s; }
    .btn-primary:active { transform: scale(0.96); }
    .result-panel { margin-top: 24px; display: none; animation: fadeIn 0.5s ease-out; }
    .person-row { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
    .item-tag { color: var(--accent-gold); font-weight: 700; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="card">
    <h2 class="header-title">מה אוכלים היום?</h2>
    <p class="header-subtitle">אופיר אוהב אוכל טעים ומטוגן</p>
    
    <div class="reel-wrapper">
      <div class="reel-strip" id="reelStrip"></div>
    </div>

    <button class="btn-primary" id="spinBtn" onclick="spin()">סובב רולטה 🎡</button>

    <div class="result-panel" id="resultPanel">
      <h3 id="moodDisplay" style="margin-bottom: 16px;"></h3>
      <div id="tasksContainer"></div>
    </div>
  </div>

  <script>
    const THE_GUYS = [
      { name: "אופיר", icon: "👑" },
      { name: "דודי", icon: "🥁" },
      { name: "סתיו", icon: "🏍️" }
    ];

    const FOOD_DB = [
      { name: "המבורגר וצ'יפס 🍔", type: "good", items: ["קציצות", "לחמניות", "צ'יפס"] },
      { name: "שווארמה בלאפה 🌯", type: "good", items: ["בשר", "לאפות", "סלטים"] },
      { name: "שניצל בחלה 🥖", type: "good", items: ["שניצלים", "חלה", "מטבוחה"] },
      { name: "חזה עוף וברוקולי 🥦", type: "bad", items: ["חזה עוף", "ברוקולי", "מים"] }
    ];

    const strip = document.getElementById('reelStrip');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick(vol = 0.1) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function init() {
      strip.innerHTML = '';
      for(let i=0; i<60; i++) {
        const item = FOOD_DB[Math.floor(Math.random()*FOOD_DB.length)];
        const div = document.createElement('div');
        div.className = 'reel-item';
        div.textContent = item.name;
        strip.appendChild(div);
      }
    }
    init();

    function spin() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const btn = document.getElementById('spinBtn');
      btn.disabled = true;
      document.getElementById('resultPanel').style.display = 'none';

      const winnerIdx = 55;
      const winner = FOOD_DB[Math.floor(Math.random()*FOOD_DB.length)];
      strip.children[winnerIdx].textContent = winner.name;
      
      let currentPos = 0;
      const targetPos = winnerIdx * 50;
      
      strip.style.transform = `translateY(-${targetPos}px)`;

      // אפקט תקתוק ורטט
      let lastTick = 0;
      const checkTick = () => {
        const style = window.getComputedStyle(strip);
        const matrix = new WebKitCSSMatrix(style.transform);
        const y = Math.abs(matrix.m42);
        const itemIdx = Math.floor(y / 50);
        
        if (itemIdx !== lastTick) {
          playTick(0.05);
          if(navigator.vibrate) navigator.vibrate(10);
          lastTick = itemIdx;
        }
        if (y < targetPos - 1) requestAnimationFrame(checkTick);
      };
      requestAnimationFrame(checkTick);

      setTimeout(() => {
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('moodDisplay').textContent = winner.type === 'good' ? "🔥 החלטה של מלכים!" : "💩 נפלנו על בריא...";
        
        const container = document.getElementById('tasksContainer');
        container.innerHTML = '';
        THE_GUYS.forEach((guy, i) => {
          container.innerHTML += `
            <div class="person-row">
              <span>${guy.icon} <b>${guy.name}</b></span>
              <span class="item-tag">${winner.items[i] || winner.items[0]}</span>
            </div>`;
        });
        if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }, 4100);
    }
  </script>
</body>
</html>
