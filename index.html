<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Ofir Roulette | Ultra Premium</title>
  <style>
    :root {
      --primary: #fbbf24; --secondary: #f43f5e; --bg: #030712;
      --glass: rgba(17, 24, 39, 0.8); --border: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0; background: var(--bg); color: #fff; font-family: system-ui, -apple-system;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      overflow: hidden; perspective: 1000px;
    }
    .container {
      width: 90%; max-width: 420px; padding: 40px 24px; border-radius: 40px;
      background: var(--glass); backdrop-filter: blur(25px);
      border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
      text-align: center; transform-style: preserve-3d; animation: entry 0.8s ease-out;
    }
    @keyframes entry { from { opacity: 0; transform: scale(0.9) translateY(20px); } }
    h1 {
      font-size: 36px; font-weight: 900; margin: 0;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { color: #64748b; font-size: 16px; margin-bottom: 30px; font-weight: 500; }
    
    .roulette-viewport {
      height: 140px; background: rgba(0,0,0,0.6); border-radius: 24px;
      position: relative; overflow: hidden; margin-bottom: 30px;
      border: 2px solid var(--border); box-shadow: inset 0 0 30px #000;
    }
    .roulette-viewport::before {
      content: ''; position: absolute; left: 0; right: 0; top: 0; bottom: 0;
      background: linear-gradient(to bottom, #000 0%, transparent 20%, transparent 80%, #000 100%);
      z-index: 2; pointer-events: none;
    }
    .roulette-indicator {
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
      width: 0; height: 0; border-top: 10px solid transparent;
      border-bottom: 10px solid transparent; border-right: 15px solid var(--primary);
      z-index: 3; filter: drop-shadow(0 0 10px var(--primary));
    }
    .strip { position: absolute; width: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
    .slot {
      height: 70px; display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .spin-button {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000; border: none; padding: 20px; width: 100%; border-radius: 20px;
      font-size: 20px; font-weight: 900; cursor: pointer;
      box-shadow: 0 10px 30px rgba(244, 63, 94, 0.3); transition: 0.2s;
    }
    .spin-button:active { transform: scale(0.96); opacity: 0.9; }
    
    .result-section { margin-top: 30px; display: none; animation: slideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } }
    .user-card {
      background: rgba(255, 255, 255, 0.03); margin: 8px 0; padding: 16px;
      border-radius: 16px; display: flex; justify-content: space-between;
      border-right: 4px solid var(--primary);
    }
    .user-card b { color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <h1>מה אוכלים היום?</h1>
    <p>אופיר אוהב אוכל טעים ומטוגן</p>
    
    <div class="roulette-viewport">
      <div class="roulette-indicator"></div>
      <div class="strip" id="strip"></div>
    </div>

    <button class="spin-button" id="spinBtn" onclick="run()">סובב רולטה 🎡</button>

    <div class="result-section" id="results">
      <h2 id="status" style="font-size: 28px; margin-bottom: 20px;"></h2>
      <div id="taskGrid"></div>
    </div>
  </div>

  <script>
    const GUYS = [
      { n: "אופיר", i: "👑" },
      { n: "דודי", i: "🥁" },
      { n: "סתיו", i: "🏍️" }
    ];

    const MENU = [
      { n: "המבורגר וצ'יפס 🍔", g: true, t: "🔥 החלטה של מלכים!", m: ["קציצות", "לחמניות", "צ'יפס"] },
      { n: "שווארמה בלאפה 🌯", g: true, t: "🔥 פינוק מהסרטים!", m: ["בשר", "לאפות", "סלטים"] },
      { n: "שניצל בחלה 🥖", g: true, t: "🔥 החלטה גאונית!", m: ["שניצלים", "חלה", "מטבוחה"] },
      { n: "חזה עוף וברוקולי 🥦", g: false, t: "🤢 נפילה של החיים...", m: ["חזה עוף", "ברוקולי", "מים"] }
    ];

    const strip = document.getElementById('strip');
    const audio = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.frequency.setValueAtTime(150, audio.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + 0.1);
      osc.connect(gain); gain.connect(audio.destination);
      osc.start(); osc.stop(audio.currentTime + 0.1);
    }

    // בניה של הרולטה
    for(let i=0; i<80; i++) {
      const el = document.createElement('div');
      el.className = 'slot';
      el.textContent = MENU[Math.floor(Math.random()*MENU.length)].n;
      strip.appendChild(el);
    }

    function run() {
      if(audio.state === 'suspended') audio.resume();
      document.getElementById('spinBtn').disabled = true;
      const winnerIdx = 72;
      const winner = MENU[Math.floor(Math.random()*MENU.length)];
      
      strip.children[winnerIdx].textContent = winner.n;
      strip.style.transform = `translateY(-${winnerIdx * 70 - 35}px)`;

      let lastPos = 0;
      const loop = () => {
        const y = Math.abs(new WebKitCSSMatrix(window.getComputedStyle(strip).transform).m42);
        const currentItem = Math.floor(y / 70);
        if(currentItem !== lastPos) {
          playTick();
          if(navigator.vibrate) navigator.vibrate(12);
          lastPos = currentItem;
        }
        if(y < (winnerIdx * 70 - 40)) requestAnimationFrame(loop);
      };
      loop();

      setTimeout(() => {
        document.getElementById('results').style.display = 'block';
        document.getElementById('status').textContent = winner.t;
        document.getElementById('status').style.color = winner.g ? '#fbbf24' : '#f43f5e';
        
        const grid = document.getElementById('taskGrid');
        grid.innerHTML = '';
        GUYS.forEach((g, i) => {
          grid.innerHTML += `
            <div class="user-card">
              <span>${g.i} <b>${g.n}</b></span>
              <span>${winner.m[i]}</span>
            </div>`;
        });
        if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }, 5200);
    }
  </script>
</body>
</html>
